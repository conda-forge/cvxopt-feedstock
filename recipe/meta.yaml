{% set version = "1.3.3" %}
{% set suitesparse_for_win_version = "7.12.2" %}

package:
  name: cvxopt
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/c/cvxopt/cvxopt-{{ version }}.tar.gz
    sha256: 8059cef41f1f115c87bc9b75fec9f86db95e7f0afcf03a52d619ba433e443bcb

  # on windows, building suitesparse in directly works much better than trying to build it separately and link it in
  - url: https://github.com/DrTimothyAldenDavis/SuiteSparse/archive/v{{ suitesparse_for_win_version }}.tar.gz  # [win]
    sha256: 679412daa5f69af96d6976595c1ac64f252287a56e98cc4a8155d09cc7fd69e8  # [win]
    folder: suitesparse  # [win]

build:
  skip: true  # [py<35]
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - libblas
    - liblapack
    - python
    - setuptools
    - setuptools_scm
    - gsl
    - fftw
    - dsdp
    - glpk
    # suitesparse is linked against on windows, and compiled-in on windows, because yeah, windows.
    - suitesparse          # [not win]
  run:
    - python
    - gsl
    - fftw
    - dsdp
    - glpk
    - suitesparse          # [not win]

test:
  imports:
    - cvxopt
    - cvxopt.base
    - cvxopt.blas
    - cvxopt.cholmod
    - cvxopt.lapack
    - cvxopt.misc_solvers
    - cvxopt.umfpack
    - cvxopt.glpk
    - cvxopt.fftw
  source_files:
    - tests/*
    - examples/*
  commands:
    - pip list | grep cvxopt | grep {{ version }}
  requires:
    - pytest
    - pip
    - m2-grep   # [win]

about:
  home: https://cvxopt.org
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Convex optimization package
  doc_url: https://cvxopt.org/userguide
  dev_url: https://github.com/cvxopt/cvxopt

extra:
  recipe-maintainers:
    - jakirkham
    - martinandersen
